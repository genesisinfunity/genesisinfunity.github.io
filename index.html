<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Genesis tools</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Genesis tools</p>
          <h1>Genesis</h1>
          <p class="subtle">
            Private helper tools for secure handoff and future OAuth maintenance.
          </p>
        </div>
      </header>

      <section class="tool-grid" aria-label="Available tools">
        <a class="tool-card link-card" href="./encryptor/">
          <span class="tool-name">Encryptor</span>
          <span class="tool-desc">Encrypt a secret with Genesis public key, then copy the exact payload format.</span>
        </a>
        <a class="tool-card link-card" href="./openai-oauth/">
          <span class="tool-name">OpenAI OAuth</span>
          <span class="tool-desc">Planned helper surface for minting and handling OpenAI OAuth refresh flows with a backend broker.</span>
        </a>
      </section>
    </main>
  </body>
</html>
