<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Genesis OpenAI OAuth</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Genesis tools</p>
          <h1>OpenAI OAuth</h1>
        </div>
      </header>

      <p class="subtle small"><a class="inline-link" href="../">← Back to tools</a></p>

      <section class="panel">
        <div class="panel-header compact-header">
          <h2>1. Mint</h2>
        </div>

        <div class="actions">
          <button id="mint-link-btn" class="primary" type="button">Mint OAuth link + package</button>
          <button id="copy-link-btn" type="button" disabled>Copy OAuth link</button>
          <button id="copy-package-btn" type="button" disabled>Copy package JSON</button>
        </div>

        <div class="field">
          <span>OAuth URL</span>
          <textarea id="oauth-url" rows="5" readonly placeholder="Mint a flow to get a real OAuth URL."></textarea>
        </div>

        <div class="field two-up">
          <div>
            <span>State hint</span>
            <input id="state-hint" type="text" readonly placeholder="State" />
          </div>
          <div>
            <span>Code verifier</span>
            <input id="code-verifier" type="text" readonly placeholder="Code verifier" />
          </div>
        </div>

        <div class="field">
          <span>Portable package</span>
          <textarea id="package-output" rows="14" readonly placeholder="Mint a flow to export the portable package."></textarea>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header compact-header">
          <h2>2. Finalize</h2>
        </div>

        <div class="field">
          <span>Portable package JSON</span>
          <textarea id="finalize-package-input" rows="10" placeholder="Paste portable package JSON here."></textarea>
        </div>

        <div class="field">
          <span>Localhost callback URL</span>
          <textarea id="callback-url-input" rows="4" placeholder="Paste the localhost callback URL here."></textarea>
        </div>

        <div class="actions">
          <button id="finalize-btn" class="primary" type="button">Validate + build handoff</button>
          <button id="copy-handoff-btn" type="button" disabled>Copy handoff JSON</button>
        </div>

        <div class="field two-up metrics-grid">
          <div>
            <span>Callback state</span>
            <input id="callback-state" type="text" readonly placeholder="state" />
          </div>
          <div>
            <span>Auth code present</span>
            <input id="callback-code-present" type="text" readonly placeholder="yes / no" />
          </div>
          <div>
            <span>Mint age</span>
            <input id="mint-age" type="text" readonly placeholder="age" />
          </div>
          <div>
            <span>Validation</span>
            <input id="validation-result" type="text" readonly placeholder="ok / stale / mismatch" />
          </div>
        </div>

        <div class="field">
          <span>Normalized handoff JSON</span>
          <textarea id="handoff-output" rows="18" readonly placeholder="Validation output will appear here."></textarea>
        </div>
      </section>

      <div id="status" class="status subtle">Ready.</div>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
