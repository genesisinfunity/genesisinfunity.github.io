<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Genesis OpenAI OAuth</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Genesis tools</p>
          <h1>OpenAI OAuth</h1>
        </div>
        <div class="meta">
          <span id="kid-badge" class="badge"></span>
        </div>
      </header>

      <p class="subtle small"><a class="inline-link" href="../">← Back to tools</a></p>

      <section class="panel">
        <div class="panel-header compact-header">
          <h2>1. Mint</h2>
        </div>

        <div class="actions">
          <button id="mint-link-btn" class="primary" type="button">Mint + copy login link</button>
        </div>

        <div class="field">
          <span>OAuth URL</span>
          <textarea id="oauth-url" rows="4" readonly placeholder="Mint a flow to get a real OAuth URL."></textarea>
        </div>

        <details class="compact-details">
          <summary>Show mint details</summary>
          <div class="field two-up details-body">
            <div>
              <span>State hint</span>
              <input id="state-hint" type="text" readonly placeholder="State" />
            </div>
            <div>
              <span>Code verifier</span>
              <input id="code-verifier" type="text" readonly placeholder="Code verifier" />
            </div>
          </div>
        </details>
      </section>

      <section class="panel">
        <div class="panel-header compact-header">
          <h2>2. Paste callback</h2>
        </div>

        <div class="field">
          <span>Localhost callback URL</span>
          <textarea id="callback-url-input" rows="4" placeholder="Paste the localhost callback URL here."></textarea>
        </div>

        <div class="actions">
          <button id="build-cliproxy-btn" class="primary" type="button">Build CLIProxyAPI package</button>
          <button id="build-openclaw-btn" type="button">Build OpenClaw package</button>
        </div>

        <div class="field">
          <span>Encrypted package</span>
          <textarea id="encrypted-output" rows="8" readonly placeholder="Encrypted package will appear here and auto-copy."></textarea>
        </div>

        <details class="compact-details">
          <summary>Show debug details</summary>
          <div class="field two-up metrics-grid details-body">
            <div>
              <span>Callback state</span>
              <input id="callback-state" type="text" readonly placeholder="state" />
            </div>
            <div>
              <span>Auth code present</span>
              <input id="callback-code-present" type="text" readonly placeholder="yes / no" />
            </div>
            <div>
              <span>Mint age</span>
              <input id="mint-age" type="text" readonly placeholder="age" />
            </div>
            <div>
              <span>Validation</span>
              <input id="validation-result" type="text" readonly placeholder="ok / stale / mismatch" />
            </div>
          </div>
          <div class="field details-body">
            <span>Unencrypted payload preview</span>
            <textarea id="payload-preview" rows="18" readonly placeholder="Preview will appear here after build."></textarea>
          </div>
        </details>
      </section>

      <div id="status" class="status subtle">Ready.</div>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
