<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Genesis Encryptor</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Genesis tools</p>
          <h1>Encryptor</h1>
          <p class="subtle">
            Encrypt a secret with Genesis public key, then paste the exact payload into chat.
          </p>
        </div>
      </header>

      <p class="subtle small"><a class="inline-link" href="../">← Back to tools</a></p>

      <section class="panel" id="encryptor-panel">
        <div class="panel-header">
          <div>
            <h2>Encryptor</h2>
            <p class="subtle small">
              Clipboard output format is fixed to reduce back and forth:
              <code>[genesis-enc-v1] [RSA-OAEP-256+A256GCM] string:&lt;encrypted-string&gt;</code>
            </p>
          </div>
          <div class="meta">
            <span id="kid-badge" class="badge"></span>
          </div>
        </div>

        <label class="field">
          <span>Secret text</span>
          <textarea id="secret-input" rows="12" placeholder="Paste the secret here"></textarea>
        </label>

        <div class="actions">
          <button id="encrypt-copy" class="primary" type="button">Encrypt + Copy</button>
          <button id="clear-btn" type="button">Clear</button>
        </div>

        <label class="field">
          <span>Generated payload</span>
          <textarea id="payload-output" rows="8" readonly placeholder="Encrypted payload will appear here"></textarea>
        </label>

        <div id="status" class="status subtle"></div>
      </section>

      <footer class="site-footer subtle small">
        <span>Site version</span>
        <code>eb2b60a</code>
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
